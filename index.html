<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINGULARITY</title>
<link rel="icon" href="data:,">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #888; }
canvas { display: block; width: 100vw; height: 100vh; }

#drop-zone {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  flex-direction: column; z-index: 100; background: rgba(0,0,0,0.95);
  transition: opacity 0.5s;
}
#drop-zone.hidden { opacity: 0; pointer-events: none; }
#drop-zone h1 { font-size: 3rem; letter-spacing: 0.5em; color: #fff; margin-bottom: 1rem; text-transform: uppercase; }
#drop-zone p { color: #555; font-size: 0.9rem; margin-bottom: 2rem; }
#drop-zone.dragover { background: rgba(20,10,5,0.95); }
#drop-zone.dragover h1 { color: #f80; }
#file-input { display: none; }
#drop-zone label {
  padding: 12px 32px; border: 1px solid #333; cursor: pointer; font-size: 0.85rem;
  color: #666; transition: all 0.3s; letter-spacing: 0.2em;
}
#drop-zone label:hover { border-color: #f80; color: #f80; }
#demo-btn:hover { border-color: #a0f !important; color: #a0f !important; }

#controls {
  position: fixed; bottom: 0; left: 0; right: 0; height: 48px;

}
#controls.visible { opacity: 1; }
#controls:hover { background: rgba(0,0,0,0.8); }

}
#play-btn:hover { border-color: #aaa; color: #fff; }

#time-display { font-size: 0.7rem; color: #555; min-width: 90px; }

#seek-bar {
  flex: 1; height: 3px; -webkit-appearance: none; appearance: none;
  background: #222; outline: none; cursor: pointer; border-radius: 1px;
}
#seek-bar::-webkit-slider-thumb {
  -webkit-appearance: none; width: 10px; height: 10px; background: #666;
  border-radius: 50%; cursor: pointer;
}
#seek-bar:hover::-webkit-slider-thumb { background: #f80; }

#fps { position: fixed; top: 8px; right: 12px; font-size: 0.65rem; color: #333; z-index: 50; }
#fullscreen-btn {
  position: fixed; top: 8px; right: 60px; background: none; border: 1px solid #222;

}
#fullscreen-btn:hover { border-color: #666; color: #888; }

#debug-toggle {
  position: fixed; top: 8px; right: 110px; background: none; border: 1px solid #222;

}
#debug-toggle:hover { border-color: #666; color: #888; }

#debug-overlay {
  position: fixed; top: 32px; right: 12px; width: 200px; background: rgba(0,0,0,0.8);

}

.debug-bar { display: flex; align-items: center; margin: 2px 0; }

  position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
  background: rgba(255,0,0,0.2); border: 1px solid #f00; color: #f88;
  padding: 8px 16px; font-size: 0.75rem; z-index: 200; display: none;

}
#settings-toggle:hover { border-color: #666; color: #888; }

  position: fixed; top: 32px; left: 12px; width: 220px; background: rgba(0,0,0,0.85);

#hue-stars::-webkit-slider-thumb { background: #a0f; }

<script>
"use strict";

// ============================================================
// SINGULARITY — Audio-Reactive Black Hole Visualizer
// Stateless GPU particle system (inspired by NOVA architecture)
// ============================================================

const COUNT = 60000;

function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg; el.style.display = 'block';
    console.error('[SINGULARITY]', msg);
}

// ============================================================
// VERTEX SHADER — All physics here, stateless displacement
// Particles have base positions in an accretion disk and are
// displaced by audio forces each frame. No simulation state.
// ============================================================

const vertexShader = `#version 300 es
precision highp float;

layout(location = 0) in vec2 a_quad;
layout(location = 1) in vec2 a_base;     // base XZ position in disk
layout(location = 2) in vec2 a_dir;      // radial direction outward
layout(location = 3) in float a_orbit;   // orbital radius 0-1
layout(location = 4) in float a_seed;
layout(location = 5) in float a_band;
layout(location = 6) in float a_size;
layout(location = 7) in float a_bright;
layout(location = 8) in float a_height;  // Y offset (disk thickness)

uniform float u_bass, u_mid, u_high, u_rms, u_centroid, u_kick;
uniform float u_flux, u_zcr, u_energy, u_time, u_aspect;
uniform vec2 u_resolution;
uniform vec4 u_bands03, u_bands47;
uniform vec2 u_bands89;
uniform mat4 u_viewProj;   // combined view * projection matrix
uniform vec3 u_camRight;
uniform vec3 u_camUp;
uniform float u_hueStars;  // star hue shift in radians
uniform float u_satMul;    // saturation multiplier

out vec4 v_color;
out vec2 v_uv;
out float v_coreSharp;

float hash(float n) { return fract(sin(n) * 43758.5453); }

// Hue-rotate a color by angle (radians) — Rodrigues rotation around (1,1,1)
vec3 hueShift(vec3 c, float angle) {
    float cosA = cos(angle), sinA = sin(angle);
    float omc = 1.0 - cosA;
    float k = 1.0/3.0;
    float srt = sqrt(k);
    vec3 r;
    r.x = c.x*(cosA+omc*k) + c.y*(k*omc-srt*sinA) + c.z*(k*omc+srt*sinA);
    r.y = c.x*(k*omc+srt*sinA) + c.y*(cosA+omc*k) + c.z*(k*omc-srt*sinA);
    r.z = c.x*(k*omc-srt*sinA) + c.y*(k*omc+srt*sinA) + c.z*(cosA+omc*k);
    return r;
}

// Adjust saturation: 0=grayscale, 1=original, 2=oversaturated
vec3 satAdjust(vec3 c, float sat) {
    float lum = dot(c, vec3(0.299, 0.587, 0.114));
    return mix(vec3(lum), c, sat);
}

vec3 spectralColor(float c) {
    // Space palette: deep violet → magenta → electric blue → cyan → white
    vec3 violet  = vec3(0.4, 0.1, 0.8);
    vec3 magenta = vec3(0.85, 0.15, 0.6);
    vec3 elBlue  = vec3(0.1, 0.3, 1.0);
    vec3 cyan    = vec3(0.1, 0.75, 0.95);
    vec3 white   = vec3(0.85, 0.88, 1.0);
    if (c < 0.25) return mix(violet, magenta, c * 4.0);
    if (c < 0.5)  return mix(magenta, elBlue, (c - 0.25) * 4.0);
    if (c < 0.75) return mix(elBlue, cyan, (c - 0.5) * 4.0);
    return mix(cyan, white, (c - 0.75) * 4.0);
}

vec3 bandColor(int b) {
    // Deep space spectrum per frequency band
    if(b==0) return vec3(0.6, 0.05, 0.15);   // deep crimson
    if(b==1) return vec3(0.8, 0.1, 0.4);     // hot pink
    if(b==2) return vec3(0.7, 0.1, 0.7);     // purple
    if(b==3) return vec3(0.5, 0.15, 0.9);    // violet
    if(b==4) return vec3(0.2, 0.3, 1.0);     // electric blue
    if(b==5) return vec3(0.1, 0.55, 0.95);   // azure
    if(b==6) return vec3(0.05, 0.75, 0.85);  // teal
    if(b==7) return vec3(0.15, 0.85, 0.7);   // aqua
    if(b==8) return vec3(0.5, 0.3, 1.0);     // indigo
    return vec3(0.75, 0.65, 1.0);            // lavender
}

float getBand(int b) {
    if(b<4) { vec4 v=u_bands03; return b==0?v.x:b==1?v.y:b==2?v.z:v.w; }
    if(b<8) { vec4 v=u_bands47; int i=b-4; return i==0?v.x:i==1?v.y:i==2?v.z:v.w; }
    return b==8?u_bands89.x:u_bands89.y;
}

void main() {
    float seed = a_seed;
    float t = u_time;
    int band = int(a_band);
    float bVal = getBand(band);

    // Per-particle identity hashes
    float h1 = hash(seed * 1.1), h2 = hash(seed * 2.2), h3 = hash(seed * 3.3);
    float h4 = hash(seed * 4.4), h5 = hash(seed * 5.5), h6 = hash(seed * 6.6);
    float h7 = hash(seed * 7.7);

    // Per-particle time (unique rhythm)
    float myTime1 = t * (0.3 + h1 * 0.7) + seed * 50.0;
    float myTime2 = t * (0.2 + h2 * 0.6) + seed * 37.0;
    float myTime3 = t * (0.4 + h3 * 0.5) + seed * 63.0;

    // =============================================
    // POSITION: Physics-driven but controlled
    // =============================================
    vec2 p = a_base;

    // --- GRAVITY: Black hole pulls everything inward ---
    // Pull strength driven by energy: more energy = stronger gravity
    // This is the core physics interaction
    float gravityStrength = 0.02 + u_energy * 0.06 + u_bass * 0.03;
    // Inverse-distance pull (softened) — closer stars feel it more
    float dist0 = length(p);
    float pull = gravityStrength / (dist0 + 0.15);
    // Each star resists differently (h4 = inertia)
    float inertia = 0.4 + h4 * 0.6;
    p -= a_dir * pull * inertia * 0.08;

    // --- REPULSION: Kicks and bass peaks push outward ---
    // When the beat hits, gravity reverses momentarily
    float repulse = u_kick * 0.15 * (0.3 + h4 * 0.7);
    repulse += u_bass * 0.04 * h5; // bass gives gentle outward pressure
    p += a_dir * repulse;

    // --- ORBIT: Slow differential rotation ---
    float flowSpeed = 0.03 + u_energy * 0.03;
    float keplerFactor = 1.0 + (1.0 - a_orbit) * 1.2;
    float flowAngle = t * flowSpeed * keplerFactor + seed * 6.28;
    float cs = cos(flowAngle), sn = sin(flowAngle);
    p = vec2(p.x * cs - p.y * sn, p.x * sn + p.y * cs);

    // --- TIDAL FORCES: Mids create shearing streams ---
    vec2 tangent = vec2(-a_dir.y, a_dir.x);
    float wavePhase = a_orbit * 5.0 + seed * 1.5;
    float tidalAmp = u_mid * 0.012 + 0.002;
    p += tangent * sin(wavePhase + t * 0.35) * tidalAmp;

    // --- BAND RESONANCE: Stars shift when their frequency plays ---
    // Outward nudge when active, slight inward drift when silent
    float bandDisplace = bVal * 0.03 - (1.0 - bVal) * 0.005;
    p += a_dir * bandDisplace * h6;

    // --- ENERGY CONTRACTION: High energy compresses the disk ---
    p *= 1.0 + (1.0 - u_energy) * 0.08;

    // --- FLUX: Subtle spacetime ripple ---
    p += a_dir * sin(a_orbit * 6.0 - t * 0.5) * u_flux * 0.008;

    // 3D position: XZ = disk, Y = height
    // Kick inflates the disk vertically
    float yOff = a_height * (1.0 + u_kick * 0.6 + u_energy * 0.2);
    vec3 pos3 = vec3(p.x, yOff, p.y);
    float pDist = length(p);
    float nearCenter = smoothstep(0.6, 0.03, pDist);

    // =============================================
    // SIZE: This is where music energy lives
    // Stars BREATHE, SWELL, and PULSE with the music
    // =============================================

    // Each star has its own heartbeat synced to its frequency band
    float myPulseSpeed = 1.5 + h1 * 2.5;
    float myPulsePhase = h2 * 6.28;
    // Pulse amplitude increases when this star's band is active
    float pulseDepth = 0.2 + bVal * 0.5;
    float pulse = 1.0 - pulseDepth + pulseDepth * (0.5 + 0.5 * sin(myTime1 * myPulseSpeed + myPulsePhase));

    // Band reactivity: star SWELLS when its frequency hits hard
    float bandSwell = 1.0 + bVal * bVal * 4.0;

    // Kick: sudden size burst, per-particle reactivity
    float kickBurst = 1.0 + u_kick * 3.0 * (0.3 + h4 * 0.7);

    // RMS: overall loudness makes everything bigger
    float loudnessScale = 1.0 + u_rms * 1.2;

    // Energy: high energy = stars swell toward center
    float energySwell = 1.0 + u_energy * 0.8 * nearCenter;

    float sz = a_size * pulse * bandSwell * kickBurst * loudnessScale * energySwell;
    sz = max(sz, 0.4);

    // Billboard
    vec3 billboard = pos3 + (u_camRight * a_quad.x + u_camUp * a_quad.y) * sz * 0.006;
    gl_Position = u_viewProj * vec4(billboard, 1.0);
    v_uv = a_quad;

    // =============================================
    // COLOR: Stars change hue, temperature, and
    // intensity based on what the music is doing
    // =============================================

    // Base color from spectral centroid (overall music tone)
    vec3 baseCol = spectralColor(u_centroid);

    // Band color — each star has its own frequency identity
    vec3 bC = bandColor(band);

    // When this star's band is active, it shifts toward its band color
    // When quiet, it falls back to the ambient spectral color
    float bandActivity = bVal * 0.7 * (0.4 + h7 * 0.6);
    vec3 col = mix(baseCol, bC, bandActivity);

    // Bass makes stars warmer (shifts toward magenta/red)
    vec3 bassWarm = vec3(0.9, 0.2, 0.5);
    col = mix(col, bassWarm, u_bass * 0.25 * (0.5 + h5 * 0.5));

    // High frequencies make bright stars flash white (shimmer)
    float shimmerRate = 3.0 + h1 * 5.0;
    float shimmer = u_high * a_bright * (0.5 + 0.5 * sin(myTime3 * shimmerRate));
    col = mix(col, vec3(1.0), shimmer * 0.5);

    // Near center = hotter, more saturated
    col = mix(col, col * 2.0 + vec3(0.25, 0.1, 0.45), nearCenter * 0.6);

    // Kick flash: momentary white-hot burst
    col = mix(col, vec3(1.0, 0.9, 0.95), u_kick * 0.3 * (0.3 + h4 * 0.7));

    // =============================================
    // BRIGHTNESS & ALPHA: Loudness = visibility
    // Stars glow brighter when the music is loud
    // =============================================

    // Base brightness from star class
    float bright = 0.4 + a_bright * 0.6;

    // RMS loudness drives overall brightness
    bright *= 0.6 + u_rms * 1.0;

    // Band activity makes individual stars flare
    bright *= 1.0 + bVal * bVal * 1.5;

    // Energy drives the whole field
    bright *= 0.7 + u_energy * 0.8;

    col *= bright;

    // Alpha: always visible, but louder = more opaque
    float alpha = 0.2 + a_bright * 0.4;                  // base: always visible
    alpha += u_energy * 0.25;                             // energy lifts everything
    alpha += bVal * bVal * 0.3;                           // band activity
    alpha += nearCenter * 0.4;                            // denser near center
    alpha += u_kick * 0.2 * h4;                           // kick flash
    alpha *= pulse;                                        // breathe with heartbeat

    // Core sharpness: driven by energy and brightness
    // High energy = sharper, more defined stars
    // Low energy = softer, dreamier
    v_coreSharp = 1.5 + a_bright * 3.0 + u_energy * 2.0 + nearCenter * 2.0;

    // Apply hue shift and saturation
    col = hueShift(col, u_hueStars);
    col = satAdjust(col, u_satMul);

    v_color = vec4(col, min(alpha, 1.0));
}
`;

const fragmentShader = `#version 300 es
precision mediump float;
in vec4 v_color;
in vec2 v_uv;
in float v_coreSharp;
out vec4 fragColor;

void main() {
    float d = length(v_uv);

    // Sharp core that responds to v_coreSharp
    float core = exp(-d * d * v_coreSharp * 6.0);
    // Soft halo — the glow around each star
    float halo = exp(-d * d * 1.2) * 0.3;
    float shape = core + halo;

    // 4-point diffraction spikes — visible on bright stars
    float angle = atan(v_uv.y, v_uv.x);
    float spike = pow(abs(cos(angle * 2.0)), 40.0) * exp(-d * 2.5) * 0.12 * v_color.a;

    vec3 col = v_color.rgb * (shape + spike);
    // Hot white core
    col += vec3(0.2, 0.15, 0.3) * core * core * v_color.a;

    float alpha = v_color.a * (shape + spike * 0.4);
    fragColor = vec4(col, alpha);
}
`;

const postVS = `#version 300 es
in vec2 a_pos;
out vec2 v_uv;
void main() {
    v_uv = a_pos * 0.5 + 0.5;
    gl_Position = vec4(a_pos, 0.0, 1.0);
}
`;

const postFS = `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 fragColor;

uniform sampler2D u_scene;
uniform float u_rms;
uniform float u_flux;
uniform float u_centroid;
uniform float u_kick;
uniform float u_bass;
uniform float u_high;
uniform float u_energy;
uniform float u_time;
uniform float u_camDist;
uniform float u_hueHole;   // black hole hue shift in radians
uniform float u_hueAll;    // global hue shift
uniform float u_satMul;    // saturation multiplier
uniform vec2 u_resolution;

vec3 hueShift(vec3 c, float angle) {
    float cosA = cos(angle), sinA = sin(angle);
    float aThird = 1.0/3.0;
    float srt = sqrt(aThird);
    float omc = 1.0 - cosA;
    vec3 r;
    r.x = c.x*(cosA+omc*aThird) + c.y*(aThird*omc-srt*sinA) + c.z*(aThird*omc+srt*sinA);
    r.y = c.x*(aThird*omc+srt*sinA) + c.y*(cosA+omc*aThird) + c.z*(aThird*omc-srt*sinA);
    r.z = c.x*(aThird*omc-srt*sinA) + c.y*(aThird*omc+srt*sinA) + c.z*(cosA+omc*aThird);
    return r;
}

vec3 satAdjust(vec3 c, float sat) {
    float lum = dot(c, vec3(0.299, 0.587, 0.114));
    return mix(vec3(lum), c, sat);
}

vec3 spectralColor(float c) {
    vec3 violet  = vec3(0.4, 0.1, 0.8);
    vec3 magenta = vec3(0.85, 0.15, 0.6);
    vec3 elBlue  = vec3(0.1, 0.3, 1.0);
    vec3 cyan    = vec3(0.1, 0.75, 0.95);
    vec3 white   = vec3(0.85, 0.88, 1.0);
    if (c < 0.25) return mix(violet, magenta, c * 4.0);
    if (c < 0.5)  return mix(magenta, elBlue, (c - 0.25) * 4.0);
    if (c < 0.75) return mix(elBlue, cyan, (c - 0.5) * 4.0);
    return mix(cyan, white, (c - 0.75) * 4.0);
}

void main() {
    vec2 uv = v_uv;
    vec2 center = vec2(0.5);
    vec2 toCenter = center - uv;
    float dist = length(toCenter);
    vec2 dir = dist > 0.0 ? toCenter / dist : vec2(0.0);

    // Zoom scale for lensing
    float zs = 3.0 / max(u_camDist, 0.5);

    // Gravitational lensing — stronger on drops, scales with zoom
    float lensRadius = (0.12 + u_flux * 0.08 + u_kick * 0.06) * zs;
    float lensStrength = (0.025 + u_flux * 0.04 + u_bass * 0.02 + u_kick * 0.03) * zs;
    float lensFactor = smoothstep(lensRadius, 0.0, dist);
    vec2 lensedUV = clamp(uv + dir * lensFactor * lensStrength, 0.0, 1.0);

    vec3 col = texture(u_scene, lensedUV).rgb;

    // Bloom: subtle, preserves star clarity
    float bloomStr = 0.15 + u_rms * 0.25 + u_high * 0.1;
    vec3 bloom = vec3(0.0);
    float bSize = (2.0 + u_rms * 2.5) / u_resolution.x;
    for (int i = 0; i < 8; i++) {
        float a = float(i) * 0.7854;
        for (int j = 1; j <= 2; j++) {
            float r = float(j) * bSize;
            bloom += texture(u_scene, clamp(lensedUV + vec2(cos(a), sin(a)) * r, 0.0, 1.0)).rgb;
        }
    }
    bloom /= 16.0;
    bloom *= mix(vec3(1.0), spectralColor(u_centroid), 0.6);
    col += bloom * bloomStr;

    // Zoom scale: all black hole features scale inversely with camera distance
    // At default dist (3.0), zoomScale = 1.0. Closer = bigger, further = smaller.
    float zoomScale = 3.0 / max(u_camDist, 0.5);

    // === ENERGY INTENSITY ===
    float energy = u_energy;
    float dropHeat = u_kick * 0.5 + u_bass * 0.3 + energy * 0.2;
    dropHeat = min(dropHeat, 1.0);

    // === HORIZON COLOR: space palette temperature gradient ===
    // Calm: deep violet/blue → building: magenta/purple → peak: cyan/white-hot
    vec3 coldCol  = vec3(0.15, 0.05, 0.4);        // deep space violet
    vec3 warmCol  = vec3(0.6, 0.1, 0.6);          // nebula purple
    vec3 hotCol   = vec3(0.9, 0.15, 0.7);         // hot magenta
    vec3 burnCol  = vec3(0.3, 0.5, 1.0);          // electric blue
    vec3 peakCol  = vec3(0.7, 0.9, 1.0);          // white-cyan peak

    vec3 holeColor;
    if (dropHeat < 0.2) {
        holeColor = mix(coldCol, warmCol, dropHeat * 5.0);
    } else if (dropHeat < 0.4) {
        holeColor = mix(warmCol, hotCol, (dropHeat - 0.2) * 5.0);
    } else if (dropHeat < 0.65) {
        holeColor = mix(hotCol, burnCol, (dropHeat - 0.4) * 4.0);
    } else {
        holeColor = mix(burnCol, peakCol, (dropHeat - 0.65) * 2.86);
    }

    // === SPACETIME DISTORTION: only on energy peaks ===
    float angle = atan(toCenter.y, toCenter.x);

    // Distortion threshold: nothing happens below 0.5 energy, ramps up above
    float peakIntensity = smoothstep(0.4, 0.85, energy) + u_kick * 0.8;
    peakIntensity = min(peakIntensity, 1.0);

    // When energy peaks, spacetime tears — asymmetric, violent distortion
    float warp1 = sin(angle * 2.0 + u_time * 0.7 + u_bass * 6.0) * 0.4;
    float warp2 = sin(angle * 3.0 - u_time * 1.3 + energy * 5.0) * 0.3;
    float warp3 = sin(angle * 5.0 + u_time * 2.5) * 0.15;
    // Bass-driven asymmetric bulge
    float warp4 = sin(angle * 1.0 + u_time * 0.3) * u_bass * 0.6;
    float shapeWarp = (warp1 + warp2 + warp3 + warp4) * peakIntensity;

    float warpedDist = dist + shapeWarp * 0.02 * zoomScale;

    // === EVENT HORIZON: swells and distorts on peaks ===
    float ringR = (0.03 + u_rms * 0.012 + energy * 0.025 + u_kick * 0.035) * zoomScale;
    float ringDist = abs(warpedDist - ringR);
    float ringWidth = (10000.0 - peakIntensity * 6000.0) / (zoomScale * zoomScale);
    float ring = exp(-ringDist * ringDist * ringWidth) * (0.5 + energy * 2.5 + u_kick * 2.0);
    col += holeColor * 2.5 * ring;

    // === SECONDARY RING: outer halo ===
    float outerR = ringR + (0.015 + energy * 0.025 + u_kick * 0.015) * zoomScale;
    float outerDist2 = abs(warpedDist - outerR);
    float outerRing = exp(-outerDist2 * outerDist2 * (2000.0 / (zoomScale * zoomScale))) * (0.15 + energy * 0.6 + u_kick * 0.3);
    vec3 outerCol = mix(holeColor, peakCol, peakIntensity * 0.4);
    col += outerCol * 0.6 * outerRing;

    // === ENERGY CORONA: when it really goes hard, light floods outward ===
    float coronaR = (0.1 + energy * 0.06 + u_kick * 0.04) * zoomScale;
    float corona = smoothstep(coronaR, 0.0, warpedDist) * peakIntensity * 0.8;
    vec3 coronaCol = mix(vec3(0.3, 0.1, 0.6), peakCol, peakIntensity);
    col += coronaCol * corona;

    // === BLACK HOLE VOID: grows with energy ===
    float voidR = (0.018 + energy * 0.012 + u_kick * 0.015) * zoomScale;
    float voidSoft = (0.01 + peakIntensity * 0.008) * zoomScale;
    col *= smoothstep(voidR, voidR + voidSoft, warpedDist);

    // Kick flash — tinted purple instead of white
    col += vec3(0.3, 0.15, 0.5) * u_kick * 0.15;

    // Vignette
    col *= 0.55 + 0.45 * (1.0 - smoothstep(0.3, 1.1, dist * 1.2));

    // Tone map + gamma
    col = col / (col + 1.0);
    col = pow(col, vec3(0.93));

    // Apply global hue shift, hole hue shift, and saturation
    col = hueShift(col, u_hueAll + u_hueHole);
    col = satAdjust(col, u_satMul);

    fragColor = vec4(col, 1.0);
}
`;

// ============================================================
// AUDIO ENGINE (NOVA-style asymmetric smoothing)
// ============================================================

class AudioEngine {
    constructor() {
        this.ctx = null;
        this.analyser = null;
        this.source = null;
        this.audio = null;
        this.freqData = null;
        this.timeData = null;
        this.prevFreqData = null;

        // 10 frequency bands
        this.BAND_EDGES = [0, 0.02, 0.04, 0.08, 0.14, 0.22, 0.34, 0.5, 0.7, 0.88, 1.0];
        this.bandRng = [];
        for (let i = 0; i < 10; i++) this.bandRng.push({ min: 0.5, max: 0.5 });
        this.frameCount = 0;

        // Smoothed values (NOVA-style asymmetric: fast rise, slow fall)
        this.s = {
            bass: 0, mid: 0, high: 0, rms: 0,
            centroid: 0, kick: 0, flux: 0, zcr: 0, energy: 0
        };
        this.sBands = new Float32Array(10);
        this.prevRawBass = 0;

        // Exposed features
        this.features = { ...this.s };
        this.bands = new Float32Array(10);
    }

    async loadFile(fileOrUrl) {
        if (this.source) { try { this.source.disconnect(); } catch(e) {} }
        if (this.audio) { this.audio.pause(); }

        this.audio = new Audio();
        this.audio.preload = 'auto';
        if (typeof fileOrUrl === 'string') {
            this.audio.src = fileOrUrl;
        } else {
            this.audio.src = URL.createObjectURL(fileOrUrl);
        }

        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (this.ctx.state === 'suspended') await this.ctx.resume();

        await new Promise((resolve, reject) => {
            if (this.audio.readyState >= 2) { resolve(); return; }
            this.audio.addEventListener('canplay', resolve, { once: true });
            this.audio.addEventListener('error', () => reject(new Error('Audio load failed')), { once: true });
        });

        this.source = this.ctx.createMediaElementSource(this.audio);
        this.analyser = this.ctx.createAnalyser();
        this.analyser.fftSize = 512;
        this.analyser.smoothingTimeConstant = 0.35;

        this.source.connect(this.analyser);
        this.analyser.connect(this.ctx.destination);

        const n = this.analyser.frequencyBinCount;
        this.freqData = new Uint8Array(n);
        this.timeData = new Uint8Array(this.analyser.fftSize);
        this.prevFreqData = new Uint8Array(n);

        return this.audio;
    }

    adaptBand(i, v) {
        const r = this.bandRng[i];
        if (v < r.min) r.min = v; else r.min += (v - r.min) * 0.002;
        if (v > r.max) r.max = v; else r.max += (v - r.max) * 0.002;
        const s = r.max - r.min;
        return s < 0.001 ? 0 : Math.max(0, Math.min(1, (v - r.min) / s));
    }

    update(dt) {
        if (!this.analyser || !this.freqData) return;

        this.analyser.getByteFrequencyData(this.freqData);
        this.analyser.getByteTimeDomainData(this.timeData);
        this.frameCount++;

        const freq = this.freqData;
        const time = this.timeData;
        const N = freq.length;

        // --- 10-band frequency analysis with adaptive normalization ---
        const rawBands = new Float32Array(10);
        for (let b = 0; b < 10; b++) {
            const lo = Math.floor(this.BAND_EDGES[b] * N);
            const hi = Math.floor(this.BAND_EDGES[b + 1] * N);
            let sum = 0, count = 0;
            for (let i = lo; i < hi; i++) { sum += freq[i] / 255; count++; }
            const raw = count > 0 ? sum / count : 0;
            rawBands[b] = this.frameCount > 30 ? this.adaptBand(b, raw) : raw;
        }

        // Aggregate: bass = bands 0-2, mid = 3-6, high = 7-9
        const rawBass = (rawBands[0] + rawBands[1] + rawBands[2]) / 3;
        const rawMid = (rawBands[3] + rawBands[4] + rawBands[5] + rawBands[6]) / 4;
        const rawHigh = (rawBands[7] + rawBands[8] + rawBands[9]) / 3;

        // RMS
        let rmsSum = 0;
        for (let i = 0; i < time.length; i++) {
            const v = (time[i] - 128) / 128;
            rmsSum += v * v;
        }
        const rawRMS = Math.sqrt(rmsSum / time.length);

        // Spectral centroid
        let wSum = 0, eSum = 0;
        for (let i = 0; i < N; i++) { wSum += i * freq[i]; eSum += freq[i]; }
        const rawCentroid = eSum > 0 ? (wSum / eSum) / N : 0;

        // Spectral flux
        let fluxSum = 0;
        for (let i = 0; i < N; i++) {
            const d = freq[i] - this.prevFreqData[i];
            if (d > 0) fluxSum += d;
        }
        const rawFlux = Math.min(fluxSum / (N * 50), 1.0);
        this.prevFreqData.set(freq);

        // ZCR
        let zcCount = 0;
        for (let i = 1; i < time.length; i++) {
            if ((time[i] >= 128) !== (time[i - 1] >= 128)) zcCount++;
        }
        const rawZCR = zcCount / time.length;

        // === NOVA-style asymmetric smoothing: fast rise (0.45), slow fall (0.07) ===
        const RR = 0.45, FF = 0.07;

        function smooth(current, target) {
            return current + (target - current) * (target > current ? RR : FF);
        }

        this.s.bass = smooth(this.s.bass, rawBass);
        this.s.mid = smooth(this.s.mid, rawMid);
        this.s.high = smooth(this.s.high, rawHigh);
        this.s.rms = smooth(this.s.rms, rawRMS);
        this.s.centroid = smooth(this.s.centroid, rawCentroid);
        this.s.flux = smooth(this.s.flux, rawFlux);
        this.s.zcr = smooth(this.s.zcr, rawZCR);

        // Per-band smoothing
        for (let i = 0; i < 10; i++) {
            this.sBands[i] = smooth(this.sBands[i], rawBands[i]);
        }

        // --- Kick detection (NOVA-style) ---
        const bassJump = Math.max(0, rawBass - this.prevRawBass);
        if (bassJump > 0.15) this.s.kick = Math.max(this.s.kick, bassJump * 3.0);
        this.s.kick *= 0.85; // 15% decay per frame
        this.prevRawBass = rawBass;

        // --- Energy (weighted aggregate, slow fall) ---
        const rawEnergy = this.s.bass * 0.4 + this.s.mid * 0.35 + this.s.high * 0.25;
        this.s.energy += (rawEnergy - this.s.energy) * (rawEnergy > this.s.energy ? 0.3 : 0.04);

        // Copy to features
        for (const k in this.s) this.features[k] = this.s[k];
        this.bands.set(this.sBands);
    }
}

// ============================================================
// WEBGL HELPERS
// ============================================================

function compileShader(gl, type, source) {
    const s = gl.createShader(type);
    gl.shaderSource(s, source);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        const log = gl.getShaderInfoLog(s);
        gl.deleteShader(s);
        throw new Error('Shader: ' + log);
    }
    return s;
}

function createProgram(gl, vsSrc, fsSrc) {
    const vs = compileShader(gl, gl.VERTEX_SHADER, vsSrc);
    const fs = compileShader(gl, gl.FRAGMENT_SHADER, fsSrc);
    const p = gl.createProgram();
    gl.attachShader(p, vs);
    gl.attachShader(p, fs);
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error('Link: ' + gl.getProgramInfoLog(p));
    return p;
}

function getU(gl, prog, names) {
    const u = {};
    for (const n of names) u[n] = gl.getUniformLocation(prog, n);
    return u;
}

(function main() {

    // location 8: height / Y offset (per-instance)
    gl.bindBuffer(gl.ARRAY_BUFFER, heightBuf);
    gl.enableVertexAttribArray(8);
    gl.vertexAttribPointer(8, 1, gl.FLOAT, false, 0, 0);
    gl.vertexAttribDivisor(8, 1);

    gl.bindVertexArray(null);

    // Post-processing fullscreen quad VAO
    const postVAO = gl.createVertexArray();
    gl.bindVertexArray(postVAO);
    const fsBuf = createBuffer(new Float32Array([-1,-1, 1,-1, -1,1, 1,1]));
    gl.enableVertexAttribArray(0);
    gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
    gl.bindVertexArray(null);

    resize();
    window.addEventListener('resize', resize);
    console.log('[SINGULARITY] Initialized', COUNT, 'particles');

    // --- Audio ---
    const audio = new AudioEngine();

    // --- UI ---
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const controls = document.getElementById('controls');
    const playBtn = document.getElementById('play-btn');
    const seekBar = document.getElementById('seek-bar');
    const timeDisplay = document.getElementById('time-display');
    const fpsEl = document.getElementById('fps');
    const debugOverlay = document.getElementById('debug-overlay');
    const db = {
        bass: document.getElementById('db-bass'),
        mid: document.getElementById('db-mid'),
        high: document.getElementById('db-high'),
        rms: document.getElementById('db-rms'),
        centroid: document.getElementById('db-centroid'),
        kick: document.getElementById('db-kick'),
        flux: document.getElementById('db-flux'),
        zcr: document.getElementById('db-zcr'),
        energy: document.getElementById('db-energy'),
    };

    let audioEl = null, isPlaying = false;

    async function loadAudioFile(fileOrUrl) {
        if (!fileOrUrl) return;
        const isUrl = typeof fileOrUrl === 'string';
        console.log('[SINGULARITY] Loading:', isUrl ? fileOrUrl : fileOrUrl.name);
        try { audioEl = await audio.loadFile(fileOrUrl); }
        catch (e) { showError('Audio: ' + e.message); return; }

        dropZone.classList.add('hidden');
        controls.classList.add('visible');
        audioEl.addEventListener('ended', () => { isPlaying = false; playBtn.innerHTML = '&#9654;'; });

        try { await audioEl.play(); isPlaying = true; playBtn.innerHTML = '&#9646;&#9646;'; }
        catch (e) { console.log('[SINGULARITY] Autoplay blocked'); }
    }

    fileInput.addEventListener('change', e => { if (e.target.files[0]) loadAudioFile(e.target.files[0]); });
    document.getElementById('demo-btn').addEventListener('click', () => loadAudioFile('demo.mp3'));
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) loadAudioFile(e.dataTransfer.files[0]); });

    playBtn.addEventListener('click', () => {
        if (!audioEl) return;
        if (isPlaying) { audioEl.pause(); isPlaying = false; playBtn.innerHTML = '&#9654;'; }
        else { audioEl.play(); isPlaying = true; playBtn.innerHTML = '&#9646;&#9646;'; }
    });
    seekBar.addEventListener('input', () => { if (audioEl?.duration) audioEl.currentTime = (seekBar.value / 1000) * audioEl.duration; });
    document.getElementById('fullscreen-btn').addEventListener('click', () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    });
    document.getElementById('debug-toggle').addEventListener('click', () => debugOverlay.classList.toggle('visible'));

    // --- Color settings ---
    const settingsPanel = document.getElementById('settings-panel');
    document.getElementById('settings-toggle').addEventListener('click', () => settingsPanel.classList.toggle('visible'));

    const colorSettings = { hueAll: 0, hueStars: 0, hueHole: 0, satMul: 1.0 };

    function setupSlider(id, key, toValue) {
        const slider = document.getElementById(id);
        const valEl = document.getElementById(id + '-val');
        slider.addEventListener('input', () => {
            colorSettings[key] = toValue(parseFloat(slider.value));
            valEl.textContent = slider.value;
        });
    }
    const deg2rad = v => v * Math.PI / 180.0;
    setupSlider('hue-all', 'hueAll', deg2rad);
    setupSlider('hue-stars', 'hueStars', deg2rad);
    setupSlider('hue-hole', 'hueHole', deg2rad);
    setupSlider('sat-all', 'satMul', v => v / 100.0);

    function fmt(s) { if (!s || !isFinite(s)) return '0:00'; const m = Math.floor(s/60), sc = Math.floor(s%60); return m+':'+(sc<10?'0':'')+sc; }

    // =============================================================
    // CAMERA: Orbit controls (drag to rotate, scroll to zoom)
    // =============================================================
    const cam = {
        theta: 0.0,         // horizontal angle (radians)
        phi: 0.8,           // vertical angle (0 = top-down, PI/2 = side)
        dist: 3.0,          // distance from center
        target: [0, 0, 0],  // look-at point
        // Computed each frame
        pos: [0, 0, 0],
        right: [1, 0, 0],
        up: [0, 1, 0],
        vpMatrix: new Float32Array(16)
    };

    // Mouse / touch orbit
    let isDragging = false, lastMX = 0, lastMY = 0;

    canvas.addEventListener('mousedown', (e) => {
        if (e.target !== canvas) return;
        isDragging = true; lastMX = e.clientX; lastMY = e.clientY;
        canvas.style.cursor = 'grabbing';
    });
    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - lastMX, dy = e.clientY - lastMY;
        lastMX = e.clientX; lastMY = e.clientY;
        cam.theta -= dx * 0.003;
        cam.phi = Math.max(0.15, Math.min(Math.PI - 0.15, cam.phi - dy * 0.003));
    });
    window.addEventListener('mouseup', () => { isDragging = false; canvas.style.cursor = 'grab'; });
    canvas.style.cursor = 'grab';

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        cam.dist = Math.max(1.0, Math.min(10.0, cam.dist * (1 + e.deltaY * 0.001)));
    }, { passive: false });

    // Touch support
    let lastTouchDist = 0;
    canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
            isDragging = true;
            lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
        } else if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            lastTouchDist = Math.sqrt(dx*dx + dy*dy);
        }
    });
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (e.touches.length === 1 && isDragging) {
            const dx = e.touches[0].clientX - lastMX, dy = e.touches[0].clientY - lastMY;
            lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
            cam.theta -= dx * 0.003;
            cam.phi = Math.max(0.15, Math.min(Math.PI - 0.15, cam.phi - dy * 0.003));
        } else if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const d = Math.sqrt(dx*dx + dy*dy);
            cam.dist = Math.max(0.8, Math.min(12.0, cam.dist - (d - lastTouchDist) * 0.01));
            lastTouchDist = d;
        }
    }, { passive: false });
    canvas.addEventListener('touchend', () => { isDragging = false; });

    // --- Matrix math (minimal, no library) ---
    function perspective(fov, aspect, near, far) {
        const f = 1 / Math.tan(fov / 2);
        const nf = 1 / (near - far);
        return new Float32Array([
            f/aspect, 0, 0, 0,
            0, f, 0, 0,
            0, 0, (far+near)*nf, -1,
            0, 0, 2*far*near*nf, 0
        ]);
    }

    function lookAt(eye, center, upVec) {
        // Forward (z axis, pointing from target to eye)
        let fx = eye[0]-center[0], fy = eye[1]-center[1], fz = eye[2]-center[2];
        let fl = Math.sqrt(fx*fx+fy*fy+fz*fz) || 1;
        fx/=fl; fy/=fl; fz/=fl;

        // Right = up x forward
        let rx = upVec[1]*fz - upVec[2]*fy;
        let ry = upVec[2]*fx - upVec[0]*fz;
        let rz = upVec[0]*fy - upVec[1]*fx;
        let rl = Math.sqrt(rx*rx+ry*ry+rz*rz) || 1;
        rx/=rl; ry/=rl; rz/=rl;

        // True up = forward x right
        const ux = fy*rz - fz*ry;
        const uy = fz*rx - fx*rz;
        const uz = fx*ry - fy*rx;

        // Column-major view matrix
        return {
            view: new Float32Array([
                rx, ux, fx, 0,
                ry, uy, fy, 0,
                rz, uz, fz, 0,
                -(rx*eye[0]+ry*eye[1]+rz*eye[2]),
                -(ux*eye[0]+uy*eye[1]+uz*eye[2]),
                -(fx*eye[0]+fy*eye[1]+fz*eye[2]),
                1
            ]),
            right: [rx, ry, rz],
            up: [ux, uy, uz]
        };
    }

    function mulMat4(a, b) {
        const o = new Float32Array(16);
        for (let i = 0; i < 4; i++)
            for (let j = 0; j < 4; j++)
                o[j*4+i] = a[i]*b[j*4]+a[4+i]*b[j*4+1]+a[8+i]*b[j*4+2]+a[12+i]*b[j*4+3];
        return o;
    }

    function updateCamera() {
        const sp = Math.sin(cam.phi), cp = Math.cos(cam.phi);
        const st = Math.sin(cam.theta), ct = Math.cos(cam.theta);
        cam.pos = [
            cam.dist * sp * st + cam.target[0],
            cam.dist * cp + cam.target[1],
            cam.dist * sp * ct + cam.target[2]
        ];
        const proj = perspective(Math.PI / 3, aspect, 0.01, 50.0);
        const la = lookAt(cam.pos, cam.target, [0, 1, 0]);
        cam.vpMatrix = mulMat4(proj, la.view);
        cam.right = la.right;
        cam.up = la.up;
    }

    // --- Set audio uniforms ---
    function setU(u, f, bands, t) {
        gl.uniform1f(u.u_bass, f.bass);
        gl.uniform1f(u.u_mid, f.mid);
        gl.uniform1f(u.u_high, f.high);
        gl.uniform1f(u.u_rms, f.rms);
        gl.uniform1f(u.u_centroid, f.centroid);
        gl.uniform1f(u.u_kick, f.kick);
        gl.uniform1f(u.u_flux, f.flux);
        gl.uniform1f(u.u_zcr, f.zcr);
        gl.uniform1f(u.u_energy, f.energy);
        gl.uniform1f(u.u_time, t);
        gl.uniform1f(u.u_aspect, aspect);
        gl.uniform2f(u.u_resolution, W, H);
        if (u.u_bands03 !== null) gl.uniform4f(u.u_bands03, bands[0], bands[1], bands[2], bands[3]);
        if (u.u_bands47 !== null) gl.uniform4f(u.u_bands47, bands[4], bands[5], bands[6], bands[7]);
        if (u.u_bands89 !== null) gl.uniform2f(u.u_bands89, bands[8], bands[9]);
        if (u.u_viewProj !== null) gl.uniformMatrix4fv(u.u_viewProj, false, cam.vpMatrix);
        if (u.u_camRight !== null) gl.uniform3fv(u.u_camRight, cam.right);
        if (u.u_camUp !== null) gl.uniform3fv(u.u_camUp, cam.up);
        if (u.u_camDist !== null) gl.uniform1f(u.u_camDist, cam.dist);
        if (u.u_hueStars !== null) gl.uniform1f(u.u_hueStars, colorSettings.hueAll + colorSettings.hueStars);
        if (u.u_hueHole !== null) gl.uniform1f(u.u_hueHole, colorSettings.hueHole);
        if (u.u_hueAll !== null) gl.uniform1f(u.u_hueAll, colorSettings.hueAll);
        if (u.u_satMul !== null) gl.uniform1f(u.u_satMul, colorSettings.satMul);
    }

    // --- Render loop ---
    let time = 0, lastTime = performance.now() / 1000;
    let frameCount = 0, fpsTime = 0;

    function frame(nowMs) {
        requestAnimationFrame(frame);
        const now = nowMs / 1000;
        const dt = Math.min(now - lastTime, 0.1);
        lastTime = now;
        time += dt;

        frameCount++; fpsTime += dt;
        if (fpsTime >= 1) { fpsEl.textContent = Math.round(frameCount/fpsTime)+' FPS'; frameCount = 0; fpsTime = 0; }

        audio.update(dt);

        if (audioEl?.duration) {
            seekBar.value = (audioEl.currentTime / audioEl.duration) * 1000;
            timeDisplay.textContent = fmt(audioEl.currentTime) + ' / ' + fmt(audioEl.duration);
        }

        if (debugOverlay.classList.contains('visible')) {
            const f = audio.features;
            db.bass.style.width = (f.bass*100)+'%';
            db.mid.style.width = (f.mid*100)+'%';
            db.high.style.width = (f.high*100)+'%';
            db.rms.style.width = (f.rms*100)+'%';
            db.centroid.style.width = (f.centroid*100)+'%';
            db.kick.style.width = (Math.min(f.kick,1)*100)+'%';
            db.flux.style.width = (f.flux*100)+'%';
            db.zcr.style.width = (f.zcr*100)+'%';
            db.energy.style.width = (f.energy*100)+'%';
        }

        // Update camera matrix
        updateCamera();

        // --- Render particles to FBO ---
        gl.bindFramebuffer(gl.FRAMEBUFFER, sceneFBO);
        gl.viewport(0, 0, W, H);
        gl.clearColor(0, 0, 0, 1);
        gl.clear(gl.COLOR_BUFFER_BIT);
        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE); // Additive

        gl.useProgram(renderProg);
        setU(uR, audio.features, audio.bands, time);

        gl.bindVertexArray(vao);
        gl.drawArraysInstanced(gl.TRIANGLE_STRIP, 0, 4, COUNT);
        gl.bindVertexArray(null);
        gl.disable(gl.BLEND);

        // --- Post-processing to screen ---
        gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        gl.viewport(0, 0, W, H);

        gl.useProgram(postProg);
        setU(uP, audio.features, audio.bands, time);
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, sceneTex);
        gl.uniform1i(uP.u_scene, 0);

        gl.bindVertexArray(postVAO);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        gl.bindVertexArray(null);
    }

    requestAnimationFrame(frame);
    console.log('[SINGULARITY] Running');
})();
</script>
</body>
</html>
